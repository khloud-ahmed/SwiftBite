<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SwiftBite Restaurant Dashboard - Live Orders</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="./demo-store.js"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#e9e8e7",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "outline": "#8e7164",
                    "on-background": "#1b1c1c",
                    "inverse-on-surface": "#f2f0f0",
                    "surface-bright": "#fbf9f8",
                    "on-secondary-fixed-variant": "#474746",
                    "on-surface-variant": "#5a4136",
                    "on-surface": "#1b1c1c",
                    "secondary-fixed": "#e5e2e1",
                    "background": "#fbf9f8",
                    "secondary": "#5f5e5e",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#989999",
                    "surface-container-highest": "#e4e2e2",
                    "tertiary": "#5d5f5f",
                    "on-tertiary-fixed": "#1a1c1c",
                    "primary-fixed-dim": "#ffb693",
                    "surface-variant": "#e4e2e2",
                    "on-secondary-fixed": "#1c1b1b",
                    "secondary-container": "#e2dfde",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#2f3132",
                    "surface-container-low": "#f5f3f3",
                    "primary": "#a04100",
                    "surface-dim": "#dbdad9",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-primary-container": "#572000",
                    "outline-variant": "#e2bfb0",
                    "inverse-surface": "#303031",
                    "primary-fixed": "#ffdbcc",
                    "surface-tint": "#a04100",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#ffb693",
                    "primary-container": "#ff6b00",
                    "on-primary-fixed": "#351000",
                    "on-secondary-container": "#636262",
                    "surface-container": "#efeded",
                    "on-primary-fixed-variant": "#7a3000",
                    "tertiary-fixed": "#e2e2e2",
                    "surface": "#fbf9f8",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "8px",
                    "stack-lg": "32px",
                    "gutter": "24px",
                    "margin-desktop": "40px",
                    "margin-mobile": "16px",
                    "unit": "8px",
                    "container-max-width": "1280px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Work Sans"],
                    "label-md": ["Work Sans"],
                    "headline-md": ["Work Sans"],
                    "body-md": ["Work Sans"],
                    "display-lg": ["Work Sans"],
                    "body-lg": ["Work Sans"],
                    "headline-lg": ["Work Sans"],
                    "label-sm": ["Work Sans"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
    <style>
        .kanban-column {
            min-height: calc(100vh - 180px);
        }
        .order-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .order-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md">
<!-- SideNavBar Shell -->
<aside class="h-full w-64 fixed left-0 top-0 bg-surface-container-low flex flex-col py-stack-md gap-stack-sm z-50 border-r border-outline-variant/30">
    <div class="px-6 mb-stack-lg cursor-pointer" onclick="window.location.href='./index.html'">
        <h1 class="font-headline-sm text-headline-md font-black text-primary">SwiftBite</h1>
        <p class="font-label-md text-label-md text-on-surface-variant">Partner Dashboard</p>
    </div>
    <nav class="flex-1 flex flex-col gap-1">
        <a class="bg-primary text-on-primary rounded-lg mx-2 flex items-center px-4 py-3 gap-3 transition-transform scale-95" href="#">
            <span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
            <span class="font-label-md text-label-md">Orders</span>
        </a>
        <a class="text-on-surface-variant mx-2 flex items-center px-4 py-3 gap-3 hover:bg-secondary-container transition-transform scale-95 rounded-lg" href="./partner-menu.html">
            <span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
            <span class="font-label-md text-label-md">Menu Manager</span>
        </a>
        <a class="text-on-surface-variant mx-2 flex items-center px-4 py-3 gap-3 hover:bg-secondary-container transition-transform scale-95 rounded-lg" href="./admin.html">
            <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
            <span class="font-label-md text-label-md">Admin panel</span>
        </a>
    </nav>
    <div class="px-4 mt-auto">
        <button onclick="SwiftBiteStore.logout(); window.location.href='./index.html';" class="w-full py-3 bg-inverse-surface text-inverse-on-surface rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 hover:opacity-90">
            <span class="material-symbols-outlined text-[20px]" data-icon="logout">logout</span>
            Sign Out
        </button>
    </div>
</aside>
<!-- Main Content Canvas -->
<main class="ml-64 min-h-screen">
    <!-- Header / Top Bar -->
    <header class="h-20 bg-surface flex items-center justify-between px-gutter border-b border-outline-variant sticky top-0 z-40">
        <div class="flex flex-col">
            <h2 class="font-headline-sm text-headline-sm text-on-surface font-extrabold" id="partner-orders-rest">Live Orders</h2>
            <p class="font-body-sm text-body-sm text-on-surface-variant" id="partner-orders-count">Tracking 0 active orders</p>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3 px-4 py-2 bg-surface-container rounded-full">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="font-label-md text-label-md text-on-surface">Accepting Orders</span>
                <div class="w-10 h-5 bg-primary rounded-full relative flex items-center px-1">
                    <div class="w-3.5 h-3.5 bg-on-primary rounded-full ml-auto"></div>
                </div>
            </div>
        </div>
    </header>
    <!-- Kanban Pipeline -->
    <div class="p-gutter grid grid-cols-1 md:grid-cols-3 gap-6 max-w-container-max-width mx-auto">
        <!-- Column: New Orders -->
        <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                    <h3 class="font-headline-sm text-headline-sm">New Orders</h3>
                </div>
                <span id="col-new-count" class="bg-surface-container-highest text-on-surface px-2.5 py-0.5 rounded-full font-label-md">0</span>
            </div>
            <div class="kanban-column flex flex-col gap-4 bg-surface-container-low p-3 rounded-2xl" id="col-new-container">
                <!-- Injected dynamically -->
            </div>
        </div>
        <!-- Column: Preparing -->
        <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-primary-container rounded-full"></span>
                    <h3 class="font-headline-sm text-headline-sm">Preparing</h3>
                </div>
                <span id="col-prep-count" class="bg-surface-container-highest text-on-surface px-2.5 py-0.5 rounded-full font-label-md">0</span>
            </div>
            <div class="kanban-column flex flex-col gap-4 bg-surface-container-low p-3 rounded-2xl" id="col-prep-container">
                <!-- Injected dynamically -->
            </div>
        </div>
        <!-- Column: Out for Delivery / Ready -->
        <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <h3 class="font-headline-sm text-headline-sm">Out for Delivery</h3>
                </div>
                <span id="col-dispatch-count" class="bg-surface-container-highest text-on-surface px-2.5 py-0.5 rounded-full font-label-md">0</span>
            </div>
            <div class="kanban-column flex flex-col gap-4 bg-surface-container-low p-3 rounded-2xl" id="col-dispatch-container">
                <!-- Injected dynamically -->
            </div>
        </div>
    </div>
</main>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const store = window.SwiftBiteStore;
        if (!store) return;

        const activeRestId = store.getActiveRestaurantId();
        const restaurant = store.getRestaurant(activeRestId);

        document.getElementById("partner-orders-rest").textContent = `Live Orders - ${restaurant.name}`;

        function renderKanban() {
            const orders = store.getOrders();
            // Filter orders for this restaurant
            const activeOrders = orders.filter(o => o.restaurantId === activeRestId);
            
            // Group orders
            const pendingOrders = activeOrders.filter(o => o.status === "Pending");
            const preparingOrders = activeOrders.filter(o => o.status === "Preparing");
            const dispatchOrders = activeOrders.filter(o => o.status === "Dispatched");

            // Update Counts
            document.getElementById("partner-orders-count").textContent = `Tracking ${activeOrders.filter(o => o.status !== "Delivered").length} active orders`;
            document.getElementById("col-new-count").textContent = pendingOrders.length;
            document.getElementById("col-prep-count").textContent = preparingOrders.length;
            document.getElementById("col-dispatch-count").textContent = dispatchOrders.length;

            // Render columns
            renderColumn("col-new-container", pendingOrders, "Pending");
            renderColumn("col-prep-container", preparingOrders, "Preparing");
            renderColumn("col-dispatch-container", dispatchOrders, "Dispatched");
        }

        function renderColumn(containerId, list, status) {
            const container = document.getElementById(containerId);
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="border-2 border-dashed border-outline-variant/30 rounded-xl p-8 flex flex-col items-center justify-center text-on-surface-variant opacity-40">
                        <span class="material-symbols-outlined text-4xl mb-2" data-icon="move_to_inbox">move_to_inbox</span>
                        <p class="font-label-md">No orders here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = list.map(order => {
                let actionHtml = "";
                if (status === "Pending") {
                    actionHtml = `
                        <div class="flex gap-2">
                            <button onclick="updateStatus('${order.id}', 'Preparing')" class="flex-1 py-2 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 transition-opacity">Accept</button>
                            <button onclick="updateStatus('${order.id}', 'Rejected')" class="px-3 py-2 border border-outline-variant text-error font-label-md text-label-md rounded-lg hover:bg-error-container transition-colors">Reject</button>
                        </div>
                    `;
                } else if (status === "Preparing") {
                    actionHtml = `
                        <button onclick="updateStatus('${order.id}', 'Dispatched')" class="w-full py-2 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 transition-opacity">Mark as Dispatched</button>
                    `;
                } else if (status === "Dispatched") {
                    actionHtml = `
                        <button onclick="updateStatus('${order.id}', 'Delivered')" class="w-full py-2 bg-green-600 text-white font-label-md text-label-md rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">handshake</span>
                            Handover / Complete
                        </button>
                    `;
                }

                // Time ago
                const timeDiff = Date.now() - new Date(order.timestamp);
                const mins = Math.floor(timeDiff / 60000);
                const timeAgoStr = mins <= 0 ? "Just now" : `${mins}m ago`;

                return `
                    <div class="order-card bg-surface-container-lowest p-stack-md rounded-xl shadow-sm border border-outline-variant/30 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="font-label-md text-primary font-bold">#${order.id}</span>
                                <div class="flex items-center gap-1 text-on-surface-variant">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
                                    <span class="text-body-sm font-bold">${timeAgoStr}</span>
                                </div>
                            </div>
                            <h4 class="font-headline-sm text-[16px] mb-1 font-semibold">${order.customer.name}</h4>
                            <div class="space-y-1 mb-4 border-t border-b border-outline-variant/10 py-2 my-2">
                                ${order.items.map(item => `
                                    <div class="flex justify-between text-body-sm text-on-surface-variant">
                                        <span>${item.name} x${item.quantity}</span>
                                        <span>$${(item.price * item.quantity).toFixed(2)}</span>
                                    </div>
                                `).join("")}
                                <div class="flex justify-between text-body-sm font-bold text-on-surface pt-1">
                                    <span>Total:</span>
                                    <span>$${order.total.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                        ${actionHtml}
                    </div>
                `;
            }).join("");
        }

        window.updateStatus = (orderId, newStatus) => {
            store.updateOrderStatus(orderId, newStatus);
            renderKanban();
        };

        renderKanban();

        // Listen for updates (new orders from customer)
        window.addEventListener("storage", () => {
            renderKanban();
        });
    });
</script>
</body>
</html>
