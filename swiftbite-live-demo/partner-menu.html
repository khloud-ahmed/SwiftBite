<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SwiftBite Partner Dashboard - Menu Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Work+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="./demo-store.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#e9e8e7",
                      "error-container": "#ffdad6",
                      "on-error-container": "#93000a",
                      "outline": "#8e7164",
                      "on-background": "#1b1c1c",
                      "inverse-on-surface": "#f2f0f0",
                      "surface-bright": "#fbf9f8",
                      "on-secondary-fixed-variant": "#474746",
                      "on-surface-variant": "#5a4136",
                      "on-surface": "#1b1c1c",
                      "secondary-fixed": "#e5e2e1",
                      "background": "#fbf9f8",
                      "secondary": "#5f5e5e",
                      "on-tertiary": "#ffffff",
                      "tertiary-container": "#989999",
                      "surface-container-highest": "#e4e2e2",
                      "tertiary": "#5d5f5f",
                      "on-tertiary-fixed": "#1a1c1c",
                      "primary-fixed-dim": "#ffb693",
                      "surface-variant": "#e4e2e2",
                      "on-secondary-fixed": "#1c1b1b",
                      "secondary-container": "#e2dfde",
                      "on-primary": "#ffffff",
                      "on-tertiary-container": "#2f3132",
                      "surface-container-low": "#f5f3f3",
                      "primary": "#a04100",
                      "surface-dim": "#dbdad9",
                      "tertiary-fixed-dim": "#c6c6c7",
                      "on-tertiary-fixed-variant": "#454747",
                      "on-secondary": "#ffffff",
                      "secondary-fixed-dim": "#c8c6c5",
                      "on-primary-container": "#572000",
                      "outline-variant": "#e2bfb0",
                      "inverse-surface": "#303031",
                      "primary-fixed": "#ffdbcc",
                      "surface-tint": "#a04100",
                      "error": "#ba1a1a",
                      "surface-container-lowest": "#ffffff",
                      "inverse-primary": "#ffb693",
                      "primary-container": "#ff6b00",
                      "on-primary-fixed": "#351000",
                      "on-secondary-container": "#636262",
                      "surface-container": "#efeded",
                      "on-primary-fixed-variant": "#7a3000",
                      "tertiary-fixed": "#e2e2e2",
                      "surface": "#fbf9f8",
                      "on-error": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "stack-lg": "32px",
                      "gutter": "24px",
                      "margin-desktop": "40px",
                      "margin-mobile": "16px",
                      "unit": "8px",
                      "container-max-width": "1280px",
                      "stack-md": "16px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Work Sans"],
                      "label-md": ["Work Sans"],
                      "headline-md": ["Work Sans"],
                      "body-md": ["Work Sans"],
                      "display-lg": ["Work Sans"],
                      "body-lg": ["Work Sans"],
                      "headline-lg": ["Work Sans"],
                      "label-sm": ["Work Sans"]
              },
              "fontSize": {
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf9f8;
        }
    </style>
</head>
<body class="font-body-md text-on-background">
<!-- Sidebar Navigation -->
<aside class="h-full w-64 fixed left-0 top-0 bg-surface-container-low flex flex-col py-stack-md gap-stack-sm border-r border-outline-variant/30">
    <div class="px-6 mb-8 cursor-pointer" onclick="window.location.href='./index.html'">
        <h1 class="font-headline-md text-headline-md font-black text-primary">SwiftBite</h1>
        <p class="font-label-md text-label-md text-on-surface-variant opacity-70">Kitchen Dashboard</p>
    </div>
    <nav class="flex-grow space-y-1">
        <a class="flex items-center px-4 py-3 text-on-surface-variant mx-2 hover:bg-secondary-container transition-transform scale-95 font-label-md text-label-md rounded-lg" href="./partner-orders.html">
            <span class="material-symbols-outlined mr-3" data-icon="receipt_long">receipt_long</span>
            Orders
        </a>
        <a class="flex items-center px-4 py-3 bg-primary text-on-primary rounded-lg mx-2 font-label-md text-label-md" href="#">
            <span class="material-symbols-outlined mr-3" data-icon="restaurant_menu">restaurant_menu</span>
            Menu Manager
        </a>
        <a class="flex items-center px-4 py-3 text-on-surface-variant mx-2 hover:bg-secondary-container transition-transform scale-95 font-label-md text-label-md rounded-lg" href="./admin.html">
            <span class="material-symbols-outlined mr-3" data-icon="dashboard">dashboard</span>
            Admin panel
        </a>
    </nav>
    <div class="px-4 mt-auto">
        <button onclick="SwiftBiteStore.logout(); window.location.href='./index.html';" class="w-full py-3 bg-inverse-surface text-inverse-on-surface rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 hover:opacity-90">
            <span class="material-symbols-outlined text-[20px]" data-icon="logout">logout</span>
            Sign Out
        </button>
    </div>
</aside>
<!-- Main Content Canvas -->
<main class="ml-64 p-margin-desktop min-h-screen">
    <!-- Header Section -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-stack-lg gap-stack-md">
        <div>
            <h2 id="partner-rest-title" class="font-headline-lg text-headline-lg text-on-surface font-extrabold">Menu Management</h2>
            <p class="font-body-md text-body-md text-on-surface-variant">Manage your restaurant offerings and availability.</p>
        </div>
        <div class="flex items-center gap-stack-md w-full md:w-auto">
            <div class="relative flex-1 md:w-80">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
                <input id="menu-search-input" class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md" placeholder="Search menu items..." type="text"/>
            </div>
            <button onclick="openAddModal()" class="px-6 py-2.5 bg-primary text-on-primary rounded-lg font-label-md text-label-md flex items-center gap-2 hover:opacity-90 transition-opacity">
                <span class="material-symbols-outlined" data-icon="add">add</span>
                Add New Item
            </button>
        </div>
    </header>
    <!-- Category Chips -->
    <div class="flex gap-stack-sm mb-stack-lg overflow-x-auto pb-2" id="category-chips-bar">
        <!-- Dynamically filled with active categories -->
    </div>
    <!-- Menu Data Table -->
    <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden border border-surface-variant">
        <table class="w-full text-left border-collapse">
            <thead class="bg-surface-container-low border-b border-surface-variant">
                <tr>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Photo</th>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Name</th>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Category</th>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Price</th>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Status</th>
                    <th class="px-6 py-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-surface-variant" id="partner-menu-tbody">
                <!-- Dynamically rendered menu items -->
            </tbody>
        </table>
        <!-- Pagination / Summary -->
        <div class="px-6 py-4 bg-surface-container-low flex items-center justify-between border-t border-surface-variant">
            <span id="partner-menu-summary" class="font-body-md text-body-md text-on-surface-variant">Showing 0 items</span>
        </div>
    </div>
</main>

<!-- Add/Edit Modal -->
<div id="item-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg p-6 border border-outline-variant/30 flex flex-col gap-4">
        <div class="flex justify-between items-center border-b border-outline-variant/20 pb-3">
            <h3 id="modal-title" class="font-headline-sm text-headline-sm font-bold text-on-surface">Add Menu Item</h3>
            <button onclick="closeModal()" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-variant rounded-full p-1 transition-colors">close</button>
        </div>
        <form id="item-form" class="space-y-4">
            <input type="hidden" id="edit-item-id" value=""/>
            <div>
                <label class="block font-label-md text-label-md mb-1.5">Dish Name</label>
                <input required id="dish-name" class="w-full px-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md" placeholder="e.g. Garlic Bread" type="text"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block font-label-md text-label-md mb-1.5">Category</label>
                    <select id="dish-category" class="w-full px-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md">
                        <option value="Popular">Popular</option>
                        <option value="Main Course">Main Course</option>
                        <option value="Desserts">Desserts</option>
                    </select>
                </div>
                <div>
                    <label class="block font-label-md text-label-md mb-1.5">Price ($)</label>
                    <input required id="dish-price" class="w-full px-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md" placeholder="12.50" type="number" step="0.01"/>
                </div>
            </div>
            <div>
                <label class="block font-label-md text-label-md mb-1.5">Description</label>
                <textarea required id="dish-desc" class="w-full px-4 py-2 bg-surface border border-outline-variant rounded-lg font-body-md h-20" placeholder="Describe the ingredients and style..."></textarea>
            </div>
            <div>
                <label class="block font-label-md text-label-md mb-1.5">Image URL</label>
                <input id="dish-image" class="w-full px-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md" placeholder="Paste image URL (optional)" type="text"/>
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeModal()" class="px-6 py-2.5 border border-outline-variant rounded-xl font-label-md hover:bg-surface-container transition-colors">Cancel</button>
                <button type="submit" class="px-6 py-2.5 bg-primary text-on-primary rounded-xl font-label-md hover:opacity-90">Save Dish</button>
            </div>
        </form>
    </div>
</div>

<script>
    let activeCategoryFilter = "all";
    let searchQuery = "";

    function openAddModal() {
        document.getElementById("modal-title").textContent = "Add Menu Item";
        document.getElementById("edit-item-id").value = "";
        document.getElementById("item-form").reset();
        document.getElementById("item-modal").classList.remove("hidden");
    }

    function closeModal() {
        document.getElementById("item-modal").classList.add("hidden");
    }

    function editItem(itemJsonStr) {
        const item = JSON.parse(decodeURIComponent(itemJsonStr));
        document.getElementById("modal-title").textContent = "Edit Menu Item";
        document.getElementById("edit-item-id").value = item.id;
        document.getElementById("dish-name").value = item.name;
        document.getElementById("dish-category").value = item.category;
        document.getElementById("dish-price").value = item.price;
        document.getElementById("dish-desc").value = item.description;
        document.getElementById("dish-image").value = item.image || '';
        document.getElementById("item-modal").classList.remove("hidden");
    }

    document.addEventListener("DOMContentLoaded", () => {
        const store = window.SwiftBiteStore;
        if (!store) return;

        const activeRestId = store.getActiveRestaurantId();
        const restaurant = store.getRestaurant(activeRestId);

        document.getElementById("partner-rest-title").textContent = `Menu Management - ${restaurant.name}`;

        function renderCategoryChips(items) {
            const container = document.getElementById("category-chips-bar");
            const categories = new Set();
            items.forEach(i => categories.add(i.category));

            let html = `
                <button onclick="setCategoryFilter('all')" class="px-4 py-1.5 ${activeCategoryFilter === 'all' ? 'bg-primary text-on-primary' : 'bg-surface-container border border-outline-variant text-on-surface-variant'} rounded-full font-label-md text-label-md">All Items</button>
            `;

            categories.forEach(cat => {
                const isActive = activeCategoryFilter === cat;
                html += `
                    <button onclick="setCategoryFilter('${cat}')" class="px-4 py-1.5 ${isActive ? 'bg-primary text-on-primary' : 'bg-surface-container border border-outline-variant text-on-surface-variant'} rounded-full font-label-md text-label-md whitespace-nowrap hover:bg-secondary-container">${cat}</button>
                `;
            });
            container.innerHTML = html;
        }

        function renderTable() {
            const items = store.getMenuItems(activeRestId);
            const tbody = document.getElementById("partner-menu-tbody");
            tbody.innerHTML = "";

            const filteredItems = items.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchQuery) || item.description.toLowerCase().includes(searchQuery);
                const matchesCat = activeCategoryFilter === "all" || item.category === activeCategoryFilter;
                return matchesSearch && matchesCat;
            });

            filteredItems.forEach(item => {
                const itemStr = encodeURIComponent(JSON.stringify(item));
                tbody.innerHTML += `
                    <tr class="hover:bg-surface-container transition-colors">
                        <td class="px-6 py-4">
                            <img class="w-12 h-12 rounded-lg object-cover bg-neutral-200" src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=100&q=80'}"/>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-label-md text-label-md text-on-surface font-semibold">${item.name}</div>
                            <div class="font-label-sm text-label-sm text-outline truncate max-w-xs">${item.description}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-[12px] font-bold uppercase tracking-tight">${item.category}</span>
                        </td>
                        <td class="px-6 py-4 font-body-md text-body-md font-bold text-on-surface">$${item.price.toFixed(2)}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="relative inline-flex items-center cursor-pointer">
                                    <input checked class="sr-only peer" type="checkbox" onchange="alert('Demo: Toggle availability')"/>
                                    <div class="w-11 h-6 bg-secondary-container peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                </div>
                                <span class="font-body-md text-body-md text-on-surface">Available</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="editItem('${itemStr}')" class="p-2 text-outline hover:text-primary hover:bg-primary/10 rounded-lg transition-all flex items-center justify-center">
                                    <span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
                                </button>
                                <button onclick="deleteItem('${item.id}')" class="p-2 text-outline hover:text-error hover:bg-error-container rounded-lg transition-all flex items-center justify-center">
                                    <span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("partner-menu-summary").textContent = `Showing ${filteredItems.length} of ${items.length} items`;
            renderCategoryChips(items);
        }

        window.setCategoryFilter = (cat) => {
            activeCategoryFilter = cat;
            renderTable();
        };

        window.deleteItem = (id) => {
            if (confirm("Are you sure you want to delete this menu item?")) {
                store.deleteMenuItem(activeRestId, id);
                renderTable();
            }
        };

        // Search inputs
        document.getElementById("menu-search-input").addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderTable();
        });

        // Form Submit
        document.getElementById("item-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("edit-item-id").value;
            const name = document.getElementById("dish-name").value;
            const category = document.getElementById("dish-category").value;
            const price = parseFloat(document.getElementById("dish-price").value);
            const description = document.getElementById("dish-desc").value;
            let image = document.getElementById("dish-image").value;

            if (!image) {
                image = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&q=80";
            }

            const item = { name, category, price, description, image };
            if (id) {
                item.id = id;
            }

            store.saveMenuItem(activeRestId, item);
            closeModal();
            renderTable();
        });

        renderTable();
    });
</script>
</body>
</html>
