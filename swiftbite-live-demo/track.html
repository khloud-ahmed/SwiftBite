<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Track Your Order | SwiftBite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;800;900&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="./demo-store.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e9e8e7",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "outline": "#8e7164",
                        "on-background": "#1b1c1c",
                        "inverse-on-surface": "#f2f0f0",
                        "surface-bright": "#fbf9f8",
                        "on-secondary-fixed-variant": "#474746",
                        "on-surface-variant": "#5a4136",
                        "on-surface": "#1b1c1c",
                        "secondary-fixed": "#e5e2e1",
                        "background": "#fbf9f8",
                        "secondary": "#5f5e5e",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#989999",
                        "surface-container-highest": "#e4e2e2",
                        "tertiary": "#5d5f5f",
                        "on-tertiary-fixed": "#1a1c1c",
                        "primary-fixed-dim": "#ffb693",
                        "surface-variant": "#e4e2e2",
                        "on-secondary-fixed": "#1c1b1b",
                        "secondary-container": "#e2dfde",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#2f3132",
                        "surface-container-low": "#f5f3f3",
                        "primary": "#a04100",
                        "surface-dim": "#dbdad9",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary-container": "#572000",
                        "outline-variant": "#e2bfb0",
                        "inverse-surface": "#303031",
                        "primary-fixed": "#ffdbcc",
                        "surface-tint": "#a04100",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#ffb693",
                        "primary-container": "#ff6b00",
                        "on-primary-fixed": "#351000",
                        "on-secondary-container": "#636262",
                        "surface-container": "#efeded",
                        "on-primary-fixed-variant": "#7a3000",
                        "tertiary-fixed": "#e2e2e2",
                        "surface": "#fbf9f8",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "unit": "8px",
                        "container-max": "1280px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Work Sans"],
                        "headline-md": ["Work Sans"],
                        "headline-sm": ["Work Sans"],
                        "body-sm": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "label-md": ["Work Sans"],
                        "display-lg": ["Work Sans"],
                        "body-md": ["Work Sans"],
                        "headline-lg": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(to right, rgba(251, 249, 248, 0.9) 0%, rgba(251, 249, 248, 0) 40%);
        }
        @media (max-width: 768px) {
            .map-gradient-overlay {
                background: linear-gradient(to top, rgba(251, 249, 248, 0.9) 0%, rgba(251, 249, 248, 0) 40%);
            }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 w-full bg-surface shadow-sm z-50 border-b border-surface-container-high">
    <div class="flex justify-between items-center h-16 px-gutter max-w-container-max mx-auto">
        <div class="flex items-center gap-stack-md">
            <span class="font-headline-md text-headline-md font-bold text-primary cursor-pointer" onclick="window.location.href='./index.html'">SwiftBite</span>
        </div>
        <nav class="hidden md:flex gap-gutter">
            <a class="text-on-surface-variant transition-colors hover:text-primary font-body-md text-body-md" href="./index.html">Browse</a>
            <a class="text-on-surface-variant transition-colors hover:text-primary font-body-md text-body-md" href="#">Offers</a>
            <a class="text-on-surface-variant transition-colors hover:text-primary font-body-md text-body-md" href="#">Support</a>
        </nav>
        <div class="flex items-center gap-stack-md">
            <button class="material-symbols-outlined text-on-surface-variant">location_on</button>
            <button class="material-symbols-outlined text-on-surface-variant">account_circle</button>
        </div>
    </div>
</header>
<main class="relative h-screen w-full pt-16">
    <!-- Full-Width Map Interface -->
    <div class="absolute inset-0 z-0 bg-surface-variant overflow-hidden">
        <img alt="City Tracking Map" class="w-full h-full object-cover grayscale-[20%] opacity-80 animate-pulse" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBma2duEnGj49-7IJ4W9rNMgW3D5js7c0xQlik-4WDyYyMU7JaQSUdnap0tDtethycev4YDrt0TQCNteSwuRN5k1XpFg97CWAC0J7TPs8jSUewUAWjh2nu2XMwso9yYnf9i44bxp4QF4ILyqlsTI1RyrNzZg2JWvZ9lzCF12-_rGmh3FN52Mxm42OGTyB12ZM12I_HPQ79L1KAZnZ0G4Ely9PRs8ezinrQPTx9OuPxNeAFxfg16CAN8okx2SlP90qj8mn8EiQpSWLVI"/>
        <!-- Map Overlays / Pins -->
        <div id="courier-pin" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-all duration-1000">
            <div class="relative flex flex-col items-center">
                <div class="bg-primary p-2 rounded-full shadow-lg border-2 border-on-primary">
                    <span class="material-symbols-outlined text-on-primary text-[32px]">delivery_dining</span>
                </div>
                <div id="courier-status-bubble" class="mt-2 bg-surface px-3 py-1 rounded-full shadow-md text-label-md font-label-md text-primary font-bold">
                    On the way
                </div>
            </div>
        </div>
        <!-- Destination Pin -->
        <div class="absolute top-1/3 right-1/4">
            <div class="relative flex flex-col items-center">
                <div class="bg-on-surface p-1 rounded-full shadow-lg border-2 border-surface">
                    <span class="material-symbols-outlined text-surface text-[24px]">home</span>
                </div>
            </div>
        </div>
        <!-- Gradient fade for readability of sidebar -->
        <div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
    </div>
    <!-- Order Tracking Sidebar/Overlay Card -->
    <div class="relative z-10 h-full max-w-container-max mx-auto px-gutter pointer-events-none">
        <div class="h-full flex items-center">
            <div id="tracking-card" class="w-full md:w-[420px] bg-surface/95 backdrop-blur-md shadow-xl rounded-xl p-stack-lg border border-outline-variant/30 pointer-events-auto flex flex-col gap-stack-lg">
                <!-- Order Status Header -->
                <div class="flex flex-col gap-stack-sm">
                    <span class="text-primary font-label-md text-label-md uppercase tracking-wider">Estimated Arrival</span>
                    <div class="flex items-end gap-stack-sm">
                        <span id="estimated-time" class="font-display-lg text-display-lg text-on-surface leading-none">25</span>
                        <span class="font-headline-sm text-headline-sm text-on-surface pb-1">mins</span>
                    </div>
                    <p class="text-on-surface-variant font-body-md text-body-md">Your meal from <span id="track-rest-name" class="font-bold text-on-surface">The Restaurant</span> is <span id="status-desc" class="font-semibold text-primary">being prepared</span>.</p>
                </div>
                <!-- Progress Stepper -->
                <div class="flex flex-col gap-stack-md py-stack-md" id="progress-stepper">
                    <!-- Steps will be dynamically rendered here -->
                </div>
                <!-- Driver Card -->
                <div class="bg-surface-container rounded-lg p-stack-md flex flex-col gap-stack-md">
                    <div class="flex items-center gap-stack-md">
                        <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-surface shadow-sm">
                            <img alt="Driver Photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBV2v80dZ-xSqWfjrlgKyiqCF_Yf9jLjXYg72yavANQqiTGsADtZ4JARx6Vnd0NEMrA-WJmLec7C6F5xi_0dJpd_yINejJrtQpyVaTRzRnBWYYrJ8wkiQookDjkTwUSmYbGtweiWuSSPIxzpt_XkmTWXmHl40_Na7BLYh03sF-seyOz6T3NTwTMgCNGBps6SLz3R4hk98wb0h1t6CYD_wWEYNH-6ICT2vFJuT4_FGscmaN0QYHpAV2vj7ZUmnRyaUobA5p1YTMTgHvn"/>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-on-surface font-headline-sm text-headline-sm">Marcus Thompson</h4>
                            <div class="flex items-center gap-2 text-on-surface-variant">
                                <span class="text-label-md font-label-md">Electric Scooter</span>
                                <span class="w-1 h-1 bg-outline rounded-full"></span>
                                <div class="flex items-center text-primary">
                                    <span class="material-symbols-outlined text-[16px] filled-icon" style="font-variation-settings: 'FILL' 1;">star</span>
                                    <span class="text-label-md font-label-md ml-1">4.9</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-stack-sm">
                        <button onclick="alert('Demo: Messaging is disabled.')" class="flex items-center justify-center gap-stack-sm bg-surface text-primary border border-outline-variant py-2.5 rounded-lg hover:bg-primary-container/10 transition-colors font-label-md text-label-md">
                            <span class="material-symbols-outlined">chat_bubble</span>
                            Message
                        </button>
                        <button onclick="alert('Demo: Calling is disabled.')" class="flex items-center justify-center gap-stack-sm bg-primary text-on-primary py-2.5 rounded-lg hover:opacity-90 transition-all font-label-md text-label-md shadow-md active:scale-95">
                            <span class="material-symbols-outlined">call</span>
                            Call
                        </button>
                    </div>
                </div>
                <!-- Order Summary Minimal -->
                <div class="pt-stack-sm border-t border-outline-variant/30 flex justify-between items-center">
                    <div class="flex flex-col">
                        <span id="track-order-id" class="text-outline text-body-sm font-body-sm font-semibold">Order #SB-82910</span>
                        <span id="track-order-stats" class="text-on-surface-variant font-label-md text-label-md">0 Items • $0.00</span>
                    </div>
                    <button onclick="toggleReceiptModal()" class="text-primary font-label-md text-label-md flex items-center hover:underline decoration-2 underline-offset-4 pointer-events-auto">
                        View Receipt
                        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Floating Controls (Bottom Mobile) -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 md:hidden flex flex-col gap-4 w-[calc(100%-32px)]">
        <button class="w-full bg-primary text-on-primary py-4 rounded-xl font-headline-sm text-headline-sm shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform pointer-events-auto">
            <span class="material-symbols-outlined">support_agent</span>
            Need Help?
        </button>
    </div>
</main>

<!-- Receipt Modal -->
<div id="receipt-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 border border-outline-variant/30 flex flex-col gap-4 max-h-[85vh] overflow-y-auto">
        <div class="flex justify-between items-center border-b border-outline-variant/20 pb-3">
            <h3 class="font-headline-sm text-headline-sm font-bold text-on-surface">Receipt Details</h3>
            <button onclick="toggleReceiptModal()" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-variant rounded-full p-1 transition-colors">close</button>
        </div>
        <div class="space-y-3" id="receipt-modal-content">
            <!-- Dynamically loaded receipt details -->
        </div>
        <div class="border-t border-outline-variant/20 pt-4 flex justify-end">
            <button onclick="toggleReceiptModal()" class="bg-primary text-on-primary px-6 py-2.5 rounded-xl font-label-md hover:opacity-90">Close</button>
        </div>
    </div>
</div>

<script>
    let currentOrderId = null;

    function toggleReceiptModal() {
        const modal = document.getElementById("receipt-modal");
        modal.classList.toggle("hidden");
    }

    document.addEventListener("DOMContentLoaded", () => {
        const store = window.SwiftBiteStore;
        if (!store) return;

        // Parse order ID from URL or grab last placed order
        const urlParams = new URLSearchParams(window.location.search);
        let orderId = urlParams.get("orderId");
        
        if (!orderId) {
            orderId = localStorage.getItem("sb_active_tracking_order_id");
        } else {
            localStorage.setItem("sb_active_tracking_order_id", orderId);
        }

        currentOrderId = orderId;
        let order = store.getOrder(orderId);

        if (!order) {
            // Render an empty state tracking card
            const trackingCard = document.getElementById("tracking-card");
            trackingCard.innerHTML = `
                <div class="text-center py-8">
                    <span class="material-symbols-outlined text-outline text-[64px] mb-4">local_shipping</span>
                    <h2 class="font-headline-md text-headline-md mb-2">No Active Order</h2>
                    <p class="text-on-surface-variant text-body-md mb-6">You don't have any order in progress at the moment.</p>
                    <button onclick="window.location.href='./index.html'" class="bg-primary text-on-primary px-6 py-3 rounded-xl font-label-md w-full">Go Browse Food</button>
                </div>
            `;
            // Hide courier pin on map
            document.getElementById("courier-pin").style.display = "none";
            return;
        }

        // Render Page details
        document.getElementById("track-rest-name").textContent = order.restaurantName;
        document.getElementById("track-order-id").textContent = `Order #${order.id}`;
        
        const totalItems = order.items.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById("track-order-stats").textContent = `${totalItems} Item${totalItems > 1 ? 's' : ''} • $${order.total.toFixed(2)}`;

        // Populate Receipt Modal
        const receiptContent = document.getElementById("receipt-modal-content");
        receiptContent.innerHTML = `
            <div class="space-y-1">
                <p class="font-label-md text-label-md uppercase tracking-wider text-outline">Merchant</p>
                <p class="font-headline-sm text-headline-sm font-bold text-on-surface">${order.restaurantName}</p>
            </div>
            <hr class="border-outline-variant/10">
            <div class="space-y-2">
                <p class="font-label-md text-label-md uppercase tracking-wider text-outline">Items</p>
                ${order.items.map(item => `
                    <div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
                        <span>${item.name} x${item.quantity}</span>
                        <span>$${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `).join("")}
            </div>
            <hr class="border-outline-variant/10">
            <div class="space-y-1 text-body-sm text-on-surface-variant">
                <div class="flex justify-between">
                    <span>Subtotal</span>
                    <span>$${order.subtotal.toFixed(2)}</span>
                </div>
                <div class="flex justify-between">
                    <span>Delivery Fee</span>
                    <span>${order.deliveryFee === 0 ? 'FREE' : '$' + order.deliveryFee.toFixed(2)}</span>
                </div>
                <div class="flex justify-between">
                    <span>Service Fee</span>
                    <span>$${order.serviceFee.toFixed(2)}</span>
                </div>
                <div class="flex justify-between">
                    <span>Tax</span>
                    <span>$${order.tax.toFixed(2)}</span>
                </div>
                <div class="flex justify-between font-label-md text-label-md text-primary font-bold pt-2 border-t border-dashed border-outline-variant/20">
                    <span>Total Paid</span>
                    <span>$${order.total.toFixed(2)}</span>
                </div>
            </div>
            <hr class="border-outline-variant/10">
            <div class="space-y-2 text-body-sm text-on-surface-variant">
                <div>
                    <span class="font-bold text-on-surface block mb-0.5">Delivery Address:</span>
                    <span>${order.address}</span>
                </div>
                <div>
                    <span class="font-bold text-on-surface block mb-0.5">Payment Method:</span>
                    <span>${order.payment}</span>
                </div>
            </div>
        `;

        // Render Stepper and Map Status
        updateTrackingState(order);

        // Listen for storage events (updates order status dynamically)
        window.addEventListener("storage", () => {
            const updatedOrder = store.getOrder(orderId);
            if (updatedOrder) {
                updateTrackingState(updatedOrder);
            }
        });

        // BACKGROUND SIMULATOR (for live demo effect)
        // If status remains Pending or Preparing, auto advance status slowly to demonstrate animations
        const autoAdvanceInterval = setInterval(() => {
            const currentOrder = store.getOrder(orderId);
            if (!currentOrder) {
                clearInterval(autoAdvanceInterval);
                return;
            }
            
            let nextStatus = null;
            if (currentOrder.status === "Pending") {
                nextStatus = "Preparing";
            } else if (currentOrder.status === "Preparing") {
                nextStatus = "Dispatched";
            } else if (currentOrder.status === "Dispatched") {
                nextStatus = "Delivered";
            }

            if (nextStatus) {
                store.updateOrderStatus(orderId, nextStatus);
                updateTrackingState(store.getOrder(orderId));
            } else {
                clearInterval(autoAdvanceInterval);
            }
        }, 20000); // Advance status every 20 seconds
    });

    function updateTrackingState(order) {
        const estimatedTimeNode = document.getElementById("estimated-time");
        const statusDescNode = document.getElementById("status-desc");
        const courierPin = document.getElementById("courier-pin");
        const courierStatusBubble = document.getElementById("courier-status-bubble");
        const stepper = document.getElementById("progress-stepper");

        // Set estimate time and map pins based on status
        let estTime = 25;
        let desc = "being prepared";
        let mapStatus = "At Restaurant";
        let pinPosition = { top: "40%", left: "45%" }; // near restaurant

        if (order.status === "Pending") {
            estTime = 30;
            desc = "awaiting acceptance";
            mapStatus = "Confirming Order";
            pinPosition = { top: "33%", left: "75%" }; // near home
        } else if (order.status === "Preparing") {
            estTime = 20;
            desc = "being freshly prepared by our chefs";
            mapStatus = "Preparing Food";
            pinPosition = { top: "40%", left: "45%" };
        } else if (order.status === "Dispatched") {
            estTime = 8;
            desc = "out for delivery with our courier";
            mapStatus = "Courier En Route";
            pinPosition = { top: "45%", left: "55%" };
        } else if (order.status === "Delivered") {
            estTime = 0;
            desc = "delivered! Enjoy your meal!";
            mapStatus = "Delivered";
            pinPosition = { top: "33%", left: "75%" }; // at home
        }

        estimatedTimeNode.textContent = estTime;
        statusDescNode.textContent = desc;
        courierStatusBubble.textContent = mapStatus;

        // Move pin on map dynamically
        courierPin.style.top = pinPosition.top;
        courierPin.style.left = pinPosition.left;

        // Stepper HTML
        const steps = [
            { key: "Pending", title: "Order Confirmed", desc: "Awaiting restaurant confirmation" },
            { key: "Preparing", title: "Preparing Food", desc: "Chef is packing ingredients" },
            { key: "Dispatched", title: "Out for Delivery", desc: "Courier is on the way" },
            { key: "Delivered", title: "Delivered", desc: "Order delivered successfully" }
        ];

        let stepperHtml = "";
        const statusOrder = ["Pending", "Preparing", "Dispatched", "Delivered"];
        const currentIndex = statusOrder.indexOf(order.status);

        steps.forEach((step, index) => {
            const isCompleted = index < currentIndex;
            const isActive = index === currentIndex;
            const isFuture = index > currentIndex;

            let stepIconHtml = "";
            let opacityClass = "";

            if (isCompleted) {
                stepIconHtml = `
                    <div class="w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center">
                        <span class="material-symbols-outlined text-[16px] font-bold">check</span>
                    </div>
                `;
            } else if (isActive) {
                stepIconHtml = `
                    <div class="w-6 h-6 rounded-full border-2 border-primary bg-primary-container/20 flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
                    </div>
                `;
            } else {
                stepIconHtml = `
                    <div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></div>
                `;
                opacityClass = "opacity-50";
            }

            const lineHtml = index < 3 ? `
                <div class="w-[2px] h-8 ${isCompleted ? 'bg-primary' : 'bg-outline-variant'}"></div>
            ` : '';

            stepperHtml += `
                <div class="flex items-start gap-stack-md ${opacityClass}">
                    <div class="flex flex-col items-center">
                        ${stepIconHtml}
                        ${lineHtml}
                    </div>
                    <div class="flex flex-col">
                        <span class="text-on-surface font-label-md text-label-md ${isActive ? 'font-bold text-primary' : ''}">${step.title}</span>
                        <span class="text-outline text-body-sm font-body-sm">${isActive ? 'In progress' : step.desc}</span>
                    </div>
                </div>
            `;
        });

        stepper.innerHTML = stepperHtml;
    }
</script>
</body>
</html>
